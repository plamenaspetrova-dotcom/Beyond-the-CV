<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plamena Petrova — Operator & builder</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="kit.css">
<link rel="stylesheet" href="page.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": 0,
  "accent": "dragonfruit",
  "motion": "playful"
}/*EDITMODE-END*/;

const ACCENTS = {
  ube:         { color: "var(--ube-800)",         label: "Ube" },
  matcha:      { color: "var(--matcha-800)",      label: "Matcha" },
  pomegranate: { color: "var(--pomegranate-400)", label: "Pom." },
  blueberry:   { color: "var(--blueberry-800)",   label: "Blueberry" },
  dragonfruit: { color: "var(--dragonfruit-500)", label: "Dragon." },
};

function applyAccent(key) {
  const c = ACCENTS[key]?.color || ACCENTS.ube.color;
  document.documentElement.style.setProperty("--accent", c);
  // Set inline styles on all accent-word / em nodes via CSS variable hook
  const sheet = document.getElementById("accent-sheet") || (() => {
    const s = document.createElement("style");
    s.id = "accent-sheet";
    document.head.appendChild(s);
    return s;
  })();
  sheet.textContent = `
    .hero-title .accent-word { color: ${c} !important; }
    .sec-title em { color: ${c} !important; }
  `;
}

function applyMotion(mode) {
  const calm = mode === "calm";
  const sheet = document.getElementById("motion-sheet") || (() => {
    const s = document.createElement("style");
    s.id = "motion-sheet";
    document.head.appendChild(s);
    return s;
  })();
  if (calm) {
    sheet.textContent = `
      .approach-card:hover, .project-card:hover { transform: translateY(-3px) !important; box-shadow: var(--shadow-clay) !important; }
      .contact-link:hover, .btn-dark:hover, .btn-ghost:hover { transform: translateY(-2px) !important; box-shadow: var(--shadow-clay) !important; }
      .marquee-track { animation-duration: 90s; }
    `;
  } else {
    sheet.textContent = "";
  }
}

function TweaksPanel({ state, setState }) {
  return (
    <div className="tweaks-panel">
      <h5>Tweaks</h5>

      <div className="tweak-row">
        <label>Hero voice</label>
        <div className="tweak-opts">
          {HERO_VARIANTS.map((_, i) => (
            <button
              key={i}
              className={"tweak-opt" + (state.heroVariant === i ? " active" : "")}
              onClick={() => setState({ ...state, heroVariant: i })}
            >
              v{i + 1}
            </button>
          ))}
        </div>
      </div>

      <div className="tweak-row">
        <label>Accent swatch</label>
        <div className="tweak-swatches">
          {Object.entries(ACCENTS).map(([k, v]) => (
            <button
              key={k}
              className={"tweak-sw" + (state.accent === k ? " active" : "")}
              style={{ background: v.color }}
              title={v.label}
              onClick={() => setState({ ...state, accent: k })}
            />
          ))}
        </div>
      </div>

      <div className="tweak-row">
        <label>Motion</label>
        <div className="tweak-opts">
          {["playful", "calm"].map(m => (
            <button
              key={m}
              className={"tweak-opt" + (state.motion === m ? " active" : "")}
              onClick={() => setState({ ...state, motion: m })}
            >
              {m}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaksOn, setTweaksOn] = useState(false);
  const [state, setStateRaw] = useState(TWEAK_DEFAULTS);

  const setState = (next) => {
    setStateRaw(next);
    // Partial persistence — only send deltas
    const edits = {};
    for (const k of Object.keys(next)) {
      if (next[k] !== state[k]) edits[k] = next[k];
    }
    if (Object.keys(edits).length && window.parent) {
      try {
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
      } catch (e) {}
    }
  };

  useEffect(() => { applyAccent(state.accent); }, [state.accent]);
  useEffect(() => { applyMotion(state.motion); }, [state.motion]);

  // Icons
  useEffect(() => {
    if (window.lucide) window.lucide.createIcons({ nameAttr: "data-lucide" });
  });

  // Tweaks host protocol — register BEFORE announcing
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOn(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", onMsg);
    try {
      window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    } catch (e) {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  return (
    <div>
      <TopNav />
      <Hero variantIdx={state.heroVariant} />
      <Marquee />
      <Approach />
      <Experience />
      <Projects />
      <Capabilities />
      <Principles />
      <Contact />
      <footer className="page-foot">
        <span>Plamena Petrova · 2026</span>
        <span>Handmade with HTML · deployed with intent</span>
        <span>Palm Jumeirah · Dubai · UAE</span>
      </footer>

      {tweaksOn && <TweaksPanel state={state} setState={setState} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
