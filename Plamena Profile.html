<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plamena Petrova — Operator &amp; builder</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
/* ============================================================
   Socinest-AI Design System — Colors & Typography Tokens
   ============================================================
   Warm, craft-forward aesthetic inspired by Clay.
   Cream canvas + named swatch palette + Roobert/Space Mono.
   ============================================================ */

/* ---------- Fonts ---------- */
/* Roobert is a licensed face — we substitute with Inter Display
   (closest geometric match on Google Fonts). Space Mono is direct.
   Replace /fonts/*.woff2 with licensed Roobert files when available. */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  /* ============================================================
     COLOR — PRIMARIES
     ============================================================ */
  --clay-black: #000000;
  --pure-white: #ffffff;
  --warm-cream: #faf9f7;          /* Page background — non-negotiable */

  /* ============================================================
     COLOR — SWATCH PALETTE (named like flavors)
     ============================================================ */
  /* Matcha (Green) */
  --matcha-300: #84e7a5;
  --matcha-600: #078a52;
  --matcha-800: #02492a;

  /* Slushie (Cyan) */
  --slushie-500: #3bd3fd;
  --slushie-800: #0089ad;

  /* Lemon (Gold) */
  --lemon-400: #f8cc65;
  --lemon-500: #fbbd41;
  --lemon-700: #d08a11;
  --lemon-800: #9d6a09;

  /* Ube (Purple) */
  --ube-300:  #c1b0ff;
  --ube-800:  #43089f;
  --ube-900:  #32037d;

  /* Pomegranate (Pink/Red) */
  --pomegranate-400: #fc7981;

  /* Blueberry (Navy) */
  --blueberry-800: #01418d;

  /* Dragonfruit (accent magenta used on hover) */
  --dragonfruit-500: #e83a8b;

  /* ============================================================
     COLOR — NEUTRALS (WARM)
     ============================================================ */
  --warm-silver:    #9f9b93;   /* secondary text */
  --warm-charcoal:  #55534e;   /* tertiary text */
  --dark-charcoal:  #333333;   /* links on light */

  /* ============================================================
     COLOR — SURFACES & BORDERS
     ============================================================ */
  --oat-border:   #dad4c8;     /* primary warm border */
  --oat-light:    #eee9df;     /* lighter border */
  --cool-border:  #e6e8ec;     /* cool-tone accent border */
  --dark-border:  #525a69;     /* borders on dark sections */
  --light-frost:  #eff1f3;     /* subtle button bg */

  /* ============================================================
     COLOR — BADGES / ACCENTS
     ============================================================ */
  --badge-blue-bg:   #f0f8ff;
  --badge-blue-text: #3859f9;
  --focus-ring:      rgb(20, 110, 245);

  /* ============================================================
     SEMANTIC — FG / BG / BORDER
     ============================================================ */
  --fg-1: var(--clay-black);       /* primary text */
  --fg-2: var(--warm-charcoal);    /* muted text */
  --fg-3: var(--warm-silver);      /* disabled / tertiary */
  --fg-inverse: var(--pure-white);

  --bg-canvas:  var(--warm-cream);
  --bg-surface: var(--pure-white);
  --bg-sunken:  var(--oat-light);

  --border-1: var(--oat-border);
  --border-2: var(--oat-light);
  --border-strong: var(--dark-charcoal);

  /* ============================================================
     SHADOWS — the signature "pressed into clay" system
     ============================================================ */
  --shadow-clay:
    rgba(0,0,0,0.10) 0px 1px 1px,
    rgba(0,0,0,0.04) 0px -1px 1px inset,
    rgba(0,0,0,0.05) 0px -0.5px 1px;

  --shadow-hard-offset: rgb(0,0,0) -7px 7px 0px;

  --focus-outline: 2px solid var(--focus-ring);

  /* ============================================================
     RADII
     ============================================================ */
  --radius-sharp:   4px;
  --radius-sm:      8px;
  --radius-badge:  11px;
  --radius-card:   12px;
  --radius-feature: 24px;
  --radius-section: 40px;
  --radius-pill:   1584px;

  /* ============================================================
     SPACING (base 8)
     ============================================================ */
  --space-0:   1px;
  --space-1:   2px;
  --space-2:   4px;
  --space-3:   6.4px;
  --space-4:   8px;
  --space-5:  12px;
  --space-6:  12.8px;
  --space-7:  16px;
  --space-8:  20px;
  --space-9:  24px;
  --space-10: 32px;
  --space-11: 48px;
  --space-12: 64px;
  --space-13: 96px;

  /* ============================================================
     TYPOGRAPHY — families
     ============================================================ */
  --font-sans: 'Inter', 'Roobert', Arial, sans-serif;
  --font-mono: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  /* OpenType stylistic sets — on licensed Roobert these light up
     distinctive glyphs. Inter ignores them gracefully. */
  --ot-display: "ss01", "ss03", "ss10", "ss11", "ss12";
  --ot-body:    "ss03", "ss10", "ss11", "ss12";

  /* ============================================================
     TYPE SCALE — role -> size / weight / line-height / tracking
     ============================================================ */
  --t-display-hero-size:    80px;
  --t-display-hero-lh:      1.00;
  --t-display-hero-track:   -3.2px;

  --t-display-2-size:       60px;
  --t-display-2-lh:         1.00;
  --t-display-2-track:      -2.4px;

  --t-section-size:         44px;
  --t-section-lh:           1.10;
  --t-section-track:        -1.32px;

  --t-card-size:            32px;
  --t-card-lh:              1.10;
  --t-card-track:           -0.64px;

  --t-feature-size:         20px;
  --t-feature-lh:           1.40;
  --t-feature-track:        -0.4px;

  --t-body-lg-size:         20px;
  --t-body-lg-lh:           1.40;

  --t-body-size:            18px;
  --t-body-lh:              1.60;
  --t-body-track:           -0.36px;

  --t-body-sm-size:         16px;
  --t-body-sm-lh:           1.50;

  --t-button-size:          16px;
  --t-button-lh:            1.50;
  --t-button-track:         -0.16px;

  --t-nav-size:             15px;
  --t-nav-lh:               1.60;

  --t-caption-size:         14px;
  --t-caption-lh:           1.50;
  --t-caption-track:        -0.14px;

  --t-small-size:           12px;
  --t-small-lh:             1.50;

  --t-label-size:           12px;
  --t-label-track:          1.08px;

  /* ============================================================
     MOTION
     ============================================================ */
  --ease-playful: cubic-bezier(0.2, 0.8, 0.2, 1.4);
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast:   120ms;
  --dur-med:    220ms;
  --dur-slow:   360ms;
}

/* ============================================================
   BASE / SEMANTIC ELEMENT STYLES
   ============================================================ */
html, body {
  background: var(--bg-canvas);
  color: var(--fg-1);
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, .h1 {
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-display);
  font-size: var(--t-display-hero-size);
  font-weight: 600;
  line-height: var(--t-display-hero-lh);
  letter-spacing: var(--t-display-hero-track);
  color: var(--fg-1);
  margin: 0;
}

h2, .h2 {
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-display);
  font-size: var(--t-section-size);
  font-weight: 600;
  line-height: var(--t-section-lh);
  letter-spacing: var(--t-section-track);
  color: var(--fg-1);
  margin: 0;
}

h3, .h3 {
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-display);
  font-size: var(--t-card-size);
  font-weight: 600;
  line-height: var(--t-card-lh);
  letter-spacing: var(--t-card-track);
  color: var(--fg-1);
  margin: 0;
}

h4, .h4 {
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-display);
  font-size: var(--t-feature-size);
  font-weight: 600;
  line-height: var(--t-feature-lh);
  letter-spacing: var(--t-feature-track);
  color: var(--fg-1);
  margin: 0;
}

p, .p {
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-body);
  font-size: var(--t-body-size);
  font-weight: 400;
  line-height: var(--t-body-lh);
  letter-spacing: var(--t-body-track);
  color: var(--fg-1);
  margin: 0;
}

small, .caption {
  font-size: var(--t-caption-size);
  line-height: var(--t-caption-lh);
  letter-spacing: var(--t-caption-track);
  color: var(--fg-2);
}

.label-upper {
  font-size: var(--t-label-size);
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: var(--t-label-track);
  text-transform: uppercase;
  color: var(--fg-2);
}

code, kbd, pre, .mono {
  font-family: var(--font-mono);
  font-size: 0.92em;
}

/* Focus — accessibility */
:where(a, button, input, select, textarea, [tabindex]):focus-visible {
  outline: var(--focus-outline);
  outline-offset: 2px;
}

/* Shared UI-kit styles — website + app */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

/* ============ Buttons ============ */
.btn {
  font-family: var(--font-sans);
  font-feature-settings: var(--ot-body);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.16px;
  line-height: 1.5;
  padding: 10px 20px;
  border-radius: 1584px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1.4),
              background-color 180ms ease,
              box-shadow 180ms ease,
              color 180ms ease;
  display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.btn-white { background:#fff; color:#000; box-shadow: var(--shadow-clay); border-color: var(--oat-border); }
.btn-white:hover { background: var(--lemon-500); transform: rotateZ(-6deg) translateY(-4px); box-shadow: var(--shadow-hard-offset); }

.btn-dark { background:#000; color:#fff; box-shadow: var(--shadow-clay); }
.btn-dark:hover { background: var(--ube-800); color:#fff; transform: rotateZ(-6deg) translateY(-4px); box-shadow: var(--shadow-hard-offset); }

.btn-matcha { background: var(--matcha-800); color:#fff; box-shadow: var(--shadow-clay); }
.btn-matcha:hover { background: var(--matcha-600); transform: rotateZ(-6deg) translateY(-4px); box-shadow: var(--shadow-hard-offset); }

.btn-ghost { background: transparent; color:#000; border:1px solid #717989; border-radius: 4px; padding: 9px 18px; }
.btn-ghost:hover { background: var(--dragonfruit-500); color:#fff; border-color: var(--dragonfruit-500); transform: rotateZ(-4deg) translateY(-3px); box-shadow: var(--shadow-hard-offset); }

.btn-sm { font-size: 12.8px; padding: 6px 12px; letter-spacing: -0.128px; }

/* ============ Card ============ */
.card {
  background: #fff;
  border: 1px solid var(--oat-border);
  border-radius: var(--radius-feature);
  box-shadow: var(--shadow-clay);
  padding: 24px;
}
.card--dashed { border-style: dashed; box-shadow: none; }
.card--compact { padding: 16px; border-radius: var(--radius-card); }

/* ============ Badge ============ */
.badge {
  display: inline-flex; align-items: center; gap:6px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  padding: 4px 10px; border-radius: 11px;
}
.badge--blue { background: var(--badge-blue-bg); color: var(--badge-blue-text); }
.badge--matcha { background: var(--matcha-800); color: var(--matcha-300); }
.badge--lemon { background: var(--lemon-500); color:#000; }
.badge--oat { background: var(--oat-light); color: var(--warm-charcoal); }
.badge--pom { background: var(--pomegranate-400); color:#000; }

/* ============ Input ============ */
.input {
  font-family: var(--font-sans);
  font-size: 16px;
  padding: 10px 14px;
  border: 1px solid #717989;
  border-radius: 4px;
  background: #fff;
  color: #000;
  outline: none;
  width: 100%;
}
.input:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }

/* ============ Label ============ */
.label-upper {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: 1.08px;
  text-transform: uppercase;
  color: var(--warm-charcoal);
}

/* ============ Section ============ */
.section {
  padding: 72px 40px;
}
.section--cream { background: var(--warm-cream); }
.section--rounded {
  border-radius: var(--radius-section);
  margin: 0 16px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

/* Plamena page-specific styles — extensions on top of kit.css */

/* Smooth page scroll */
html { scroll-behavior: smooth; }

body {
  overflow-x: hidden;
}

/* =============== Page nav =============== */
.page-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250, 249, 247, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--oat-border);
}
.page-nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
}
.page-nav-mono {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: -0.1px;
  color: var(--fg-1);
}
.page-nav-links {
  display: flex; gap: 28px; align-items: center;
}
.page-nav-links a {
  font-size: 14px; font-weight: 500; color: var(--fg-1);
  text-decoration: none; letter-spacing: -0.1px;
  transition: color 180ms ease;
}
.page-nav-links a:hover { color: var(--dragonfruit-500); }

/* =============== Hero =============== */
.hero {
  padding: 96px 32px 120px;
  position: relative;
}
.hero-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 64px;
  align-items: start;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
  letter-spacing: 0.08px;
  padding: 6px 14px;
  border: 1px dashed var(--oat-border);
  border-radius: 1584px;
  background: rgba(255,255,255,0.5);
}
.hero-eyebrow-dot {
  width: 6px; height: 6px; border-radius: 99px;
  background: var(--matcha-600);
  box-shadow: 0 0 0 4px rgba(7,138,82,0.15);
}
.hero-title {
  font-size: clamp(56px, 8vw, 104px);
  font-weight: 600;
  line-height: 0.96;
  letter-spacing: -0.045em;
  margin: 28px 0 0;
  color: var(--fg-1);
  font-feature-settings: var(--ot-display);
}
.hero-title .accent-word {
  font-style: italic;
  font-weight: 500;
  color: var(--ube-800);
  letter-spacing: -0.04em;
}
.hero-title .accent-word::before {
  content: "— ";
  color: var(--fg-3);
  font-style: normal;
}
.hero-sub {
  font-size: 20px;
  line-height: 1.45;
  color: var(--warm-charcoal);
  max-width: 560px;
  margin: 32px 0 0;
  letter-spacing: -0.2px;
}
.hero-ctas {
  display: flex; gap: 12px; margin-top: 40px; flex-wrap: wrap;
}

/* Profile card (right rail) */
.profile-card {
  background: #fff;
  border: 1px solid var(--oat-border);
  border-radius: 24px;
  padding: 20px;
  box-shadow: var(--shadow-clay);
  position: relative;
}
.profile-photo-wrap {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  aspect-ratio: 1 / 1.08;
  background: var(--lemon-500);
}
.profile-photo-wrap img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  filter: saturate(1.05);
}
.profile-photo-wrap::after {
  content: ""; position: absolute; inset: 0;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  border-radius: 16px; pointer-events: none;
}
.profile-meta {
  display: flex; flex-direction: column; gap: 8px;
  padding: 18px 6px 4px;
}
.profile-meta-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-2);
  letter-spacing: 0.02em;
}
.profile-meta-row strong {
  color: var(--fg-1); font-weight: 700;
}

/* Stamp on profile card */
.profile-stamp {
  position: absolute;
  top: -18px; right: -18px;
  width: 96px; height: 96px;
  background: var(--matcha-800);
  color: var(--matcha-300);
  border-radius: 99px;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  line-height: 1.3;
  letter-spacing: 0.06em;
  padding: 10px;
  transform: rotate(-8deg);
  box-shadow: var(--shadow-clay);
  border: 2px solid var(--warm-cream);
}

/* Marquee strip */
.marquee {
  background: var(--clay-black);
  color: var(--warm-cream);
  overflow: hidden;
  padding: 20px 0;
  border-top: 1px solid var(--dark-border);
  border-bottom: 1px solid var(--dark-border);
  margin-top: -40px;
}
.marquee-track {
  display: flex; gap: 56px;
  white-space: nowrap;
  animation: marquee 42s linear infinite;
  width: max-content;
}
.marquee-item {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 28px;
  letter-spacing: -0.04em;
  display: inline-flex; align-items: center; gap: 40px;
}
.marquee-dot {
  width: 10px; height: 10px; border-radius: 99px;
  background: var(--lemon-500);
  display: inline-block;
}
@keyframes marquee {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* =============== Section scaffolding =============== */
.sec {
  padding: 112px 32px;
}
.sec-inner {
  max-width: 1280px;
  margin: 0 auto;
}
.sec-header {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 48px;
  margin-bottom: 56px;
  align-items: start;
}
.sec-num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg-2);
  letter-spacing: 0.06em;
  padding-top: 10px;
  border-top: 1px solid var(--fg-1);
  text-transform: uppercase;
}
.sec-title {
  font-size: clamp(40px, 5vw, 68px);
  font-weight: 600;
  line-height: 1.02;
  letter-spacing: -0.035em;
  max-width: 920px;
  font-feature-settings: var(--ot-display);
}
.sec-title em {
  font-style: italic; font-weight: 500;
  color: var(--ube-800);
}

/* =============== Approach =============== */
.approach-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.approach-card {
  background: #fff;
  border: 1px solid var(--oat-border);
  border-radius: 24px;
  padding: 28px;
  box-shadow: var(--shadow-clay);
  transition: transform 220ms var(--ease-playful), box-shadow 220ms ease, background 220ms ease;
  cursor: default;
  display: flex; flex-direction: column;
  min-height: 260px;
}
.approach-card:hover {
  transform: translate(4px, -6px) rotateZ(-1.2deg);
  box-shadow: var(--shadow-hard-offset);
}
.approach-card .num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}
.approach-card h3 {
  font-size: 26px; font-weight: 600;
  letter-spacing: -0.035em;
  line-height: 1.1;
  margin-bottom: 12px;
  font-feature-settings: var(--ot-display);
}
.approach-card p {
  font-size: 15.5px;
  line-height: 1.55;
  color: var(--warm-charcoal);
  margin: 0;
  letter-spacing: -0.1px;
}
.approach-card:nth-child(2) {
  background: var(--lemon-500);
  border-color: transparent;
}
.approach-card:nth-child(2) .num { color: rgba(0,0,0,0.55); }

/* =============== Experience (swatch section) =============== */
.sec--dark {
  background: var(--clay-black);
  color: var(--warm-cream);
  border-radius: 40px;
  margin: 0 16px;
  padding: 112px 48px;
}
.sec--dark .sec-num {
  color: var(--warm-silver);
  border-top-color: var(--warm-cream);
}
.sec--dark .sec-title {
  color: var(--warm-cream);
}
.sec--dark .sec-title em {
  color: var(--lemon-500);
}

.exp-list {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--dark-border);
}

/* global React */
const { useEffect, useRef } = React;

// Thin wrapper around Lucide — loads icons by name
function Icon({ name, size = 16, color = "currentColor", style = {}, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ nameAttr: "data-lucide" });
    }
  }, [name]);
  return (
    <span
      ref={ref}
      style={{
        display: "inline-flex",
        width: size,
        height: size,
        color,
        ...style,
      }}
      {...rest}
    />
  );
}

window.Icon = Icon;

</script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = {
  "heroVariant": 0,
  "accent": "dragonfruit",
  "motion": "playful"
};

const ACCENTS = {
  ube:         { color: "var(--ube-800)",         label: "Ube" },
  matcha:      { color: "var(--matcha-800)",      label: "Matcha" },
  pomegranate: { color: "var(--pomegranate-400)", label: "Pom." },
  blueberry:   { color: "var(--blueberry-800)",   label: "Blueberry" },
  dragonfruit: { color: "var(--dragonfruit-500)", label: "Dragon." },
};

function applyAccent(key) {
  const c = ACCENTS[key]?.color || ACCENTS.ube.color;
  document.documentElement.style.setProperty("--accent", c);
  const sheet = document.getElementById("accent-sheet") || (() => {
    const s = document.createElement("style");
    s.id = "accent-sheet";
    document.head.appendChild(s);
    return s;
  })();
  sheet.textContent = `
    .hero-title .accent-word { color: ${c} !important; }
    .sec-title em { color: ${c} !important; }
  `;
}

function applyMotion(mode) {
  const calm = mode === "calm";
  const sheet = document.getElementById("motion-sheet") || (() => {
    const s = document.createElement("style");
    s.id = "motion-sheet";
    document.head.appendChild(s);
    return s;
  })();
  if (calm) {
    sheet.textContent = `
      .approach-card:hover, .project-card:hover { transform: translateY(-3px) !important; box-shadow: var(--shadow-clay) !important; }
      .contact-link:hover, .btn-dark:hover, .btn-ghost:hover { transform: translateY(-2px) !important; box-shadow: var(--shadow-clay) !important; }
      .marquee-track { animation-duration: 90s; }
    `;
  } else {
    sheet.textContent = "";
  }
}

function TweaksPanel({ state, setState }) {
  return (
    <div className="tweaks-panel">
      <h5>Tweaks</h5>
      <div className="tweak-row">
        <label>Hero voice</label>
        <div className="tweak-opts">
          {HERO_VARIANTS.map((_, i) => (
            <button
              key={i}
              className={"tweak-opt" + (state.heroVariant === i ? " active" : "")}
              onClick={() => setState({ ...state, heroVariant: i })}
            >
              v{i + 1}
            </button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Accent swatch</label>
        <div className="tweak-swatches">
          {Object.entries(ACCENTS).map(([k, v]) => (
            <button
              key={k}
              className={"tweak-sw" + (state.accent === k ? " active" : "")}
              style={{ background: v.color }}
              title={v.label}
              onClick={() => setState({ ...state, accent: k })}
            />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Motion</label>
        <div className="tweak-opts">
          {["playful", "calm"].map(m => (
            <button
              key={m}
              className={"tweak-opt" + (state.motion === m ? " active" : "")}
              onClick={() => setState({ ...state, motion: m })}
            >
              {m}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaksOn, setTweaksOn] = useState(false);
  const [state, setStateRaw] = useState(TWEAK_DEFAULTS);

  const setState = (next) => {
    setStateRaw(next);
  };

  useEffect(() => { applyAccent(state.accent); }, [state.accent]);
  useEffect(() => { applyMotion(state.motion); }, [state.motion]);

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons({ nameAttr: "data-lucide" });
  });

  return (
    <div>
      <TopNav />
      <Hero variantIdx={state.heroVariant} />
      <Marquee />
      <Approach />
      <Experience />
      <Projects />
      <Capabilities />
      <Principles />
      <Contact />
      <footer className="page-foot">
        <span>Plamena Petrova · 2026</span>
        <span>Handmade with HTML · deployed with intent</span>
        <span>Palm Jumeirah · Dubai · UAE</span>
      </footer>
      {tweaksOn && <TweaksPanel state={state} setState={setState} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
